<!-- FILTER BUTTON -->
<button class="btn btn-outline-dark rounded-pill" data-bs-toggle="modal" data-bs-target="#filterModal">

  <i class="fa-solid fa-sliders"></i>
  Filters

</button>


<!-- ================= MODAL ================= -->

<div class="modal fade" id="filterModal" tabindex="-1">

    <div class="modal-dialog modal-dialog-centered filter-modal">
        <div class="modal-content">

            <!-- HEADER -->
            <div class="modal-header">

                <h5 class="modal-title">
                    <i class="fa-solid fa-sliders"></i> Filters
                </h5>

                <button class="btn-close" data-bs-dismiss="modal">
        </button>

            </div>

            <!-- BODY -->
            <div class="modal-body">

                <!-- LOCATION -->
                <h6><i class="fa-solid fa-location-dot"></i> Location</h6>

                <div class="chip-group">

                    <span *ngFor="let city of locations" class="filter-chip" (click)="toggleLocation(city)" [class.active]="selectedLocations.includes(city)">

            <i class="fa-solid fa-location-dot"></i>
            {{ city }}

          </span>

                </div>

                <hr>

                <!-- DISTANCE -->
                <h6><i class="fa-solid fa-road"></i> Distance</h6>

                <div *ngFor="let km of distanceOptions" class="form-check">

                    <input type="checkbox" class="form-check-input" (change)="toggleDistance(km)" [checked]="selectedDistances.includes(km)">

                    <label class="form-check-label">
            {{ km }} km
          </label>

                </div>

                <hr>

                <!-- PRICE -->
                <h6><i class="fa-solid fa-indian-rupee-sign"></i> Price</h6>

                <input type="range" min="0" max="100000" step="500" [(ngModel)]="price" class="form-range">

                <div class="price-labels">
                    Up to ₹{{ price | number }}
                </div>

                <hr>

                <!-- ROOMS -->
                <h6><i class="fa-solid fa-bed"></i> Rooms</h6>

                <div class="counter">

                    <button (click)="changeRooms(-1)">−</button>
                    <span>{{ rooms }}</span>
                    <button (click)="changeRooms(1)">+</button>

                </div>

                <hr>

                <!-- GUEST -->
                <h6><i class="fa-solid fa-user-group"></i> Guests</h6>

                <div class="counter">

                    <button (click)="changeGuests(-1)">−</button>
                    <span>{{ guests }}</span>
                    <button (click)="changeGuests(1)">+</button>

                </div>

            </div>

            <!-- FOOTER -->
            <div class="modal-footer justify-content-between">
                <button class="btn btn-outline-secondary" (click)="resetFilters()">
  Reset all
</button>

                <button class="btn btn-dark rounded-pill" (click)="applyFilters()">
          Show Villas
        </button>

            </div>

        </div>
    </div>

</div>
